services:
  # Backend service
  - type: web
    name: spars-backend
    env: docker
    dockerContext: ./backend
    dockerfile: ./backend/Dockerfile
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: spars-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: spars-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: spars-db
          property: password

databases:
  - name: spars-db
    databaseName: student_db
    user: db_user
    plan: free
